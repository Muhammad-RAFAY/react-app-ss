name: Deploy React Docker App

on:
  push:
    branches:
      - main
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/react-app-ss:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/react-app-ss:latest

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3 
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            docker stop react-container || true
            docker rm react-container || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/react-app-ss:latest
            docker run -d -p 3000:80 --name react-container ${{ secrets.DOCKER_USERNAME }}/react-app-ss:latest
