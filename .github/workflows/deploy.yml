name: Deploy React Docker App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Login to DockerHub using secrets
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build the Docker image
      - name: Build Docker Image
        run: |
          docker build -t rafysoomro/react-app-ss:latest .

      # 4️⃣ Push the Docker image to DockerHub 
      - name: Push Docker Image
        run: |
          docker push rafysoomro/react-app-ss:latest
 
      # 5️⃣ Deploy to Azure VM via SSH
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            docker stop react-container || true
            docker rm react-container || true
            docker pull rafysoomro/react-app-ss:latest
            docker run -d -p 3000:80 --name react-container rafysoomro/react-app-ss:latest
